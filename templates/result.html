<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forensic Result | SIAFS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0a0e14; color: #e0e0e0; padding-bottom: 50px; }
        .navbar { background: #101620; border-bottom: 1px solid #1f2937; }
        .result-badge { padding: 10px 25px; border-radius: 50px; font-weight: bold; font-size: 1.2rem; display: inline-block; }
        .bg-fake { background: rgba(220, 53, 69, 0.2); color: #ff4d5e; border: 1px solid #dc3545; }
        .bg-real { background: rgba(40, 167, 69, 0.2); color: #2ecc71; border: 1px solid #28a745; }
        .bg-uncertain { background: rgba(255, 193, 7, 0.2); color: #ffc107; border: 1px solid #ffc107; }
        .image-card { background: #161c24; border: 1px solid #1f2937; border-radius: 15px; padding: 15px; height: 100%; }
        .img-fluid { border-radius: 10px; border: 1px solid #333; max-height: 400px; object-fit: contain; width: 100%; }
        .btn-download { background: #1f2937; color: white; border: 1px solid #374151; transition: 0.3s; border-radius: 10px; }
        .btn-download:hover { background: #374151; color: #00d2ff; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 mb-5">
    <a class="navbar-brand fw-bold" href="/"><i class="fas fa-arrow-left me-3"></i> Forensic Report</a>
    <span class="badge btn-download">Case ID: #{{ range(1000, 9999) | random }}</span>
</nav>

<div class="container">
    <div class="row mb-5 text-center">
        <div class="col-12">
            <h4 class="text-secondary text-uppercase small mb-3">Classification Result</h4>
            <div class="result-badge {% if result == 'Fake' or result == 'Tampered' %}bg-fake{% elif result == 'Real' or result == 'Authentic' %}bg-real{% else %}bg-uncertain{% endif %}">
                <i class="fas {% if result == 'Fake' or result == 'Tampered' %}fa-skull-crossbones{% elif result == 'Real' or result == 'Authentic' %}fa-check-circle{% else %}fa-exclamation-triangle{% endif %} me-2"></i>
                {{ result }}
            </div>
            <h5 class="mt-3 text-white">Confidence Score: <span class="text-info">{{ (score * 100) | round(2) }}%</span></h5>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="image-card">
                <h6 class="text-secondary mb-3"><i class="fas fa-image me-2"></i> Original Evidence</h6>
                <img src="{{ image }}" class="img-fluid" alt="Original">
            </div>
        </div>

        <div class="col-md-6">
            <div class="image-card">
                <h6 class="text-secondary mb-3"><i class="fas fa-microscope me-2"></i> Artifact Analysis Map</h6>
                <img src="{{ map }}" class="img-fluid" alt="Analysis">
            </div>
        </div>
    </div>

    <div class="row mt-5 text-center">
        <div class="col-12">
            <a href="/download" class="btn btn-download btn-lg px-5 me-3">
                <i class="fas fa-file-pdf me-2 text-danger"></i> Export PDF Report
            </a>
            <a href="/" class="btn btn-outline-secondary btn-lg px-5">Analyze New Image</a>
        </div>
    </div>
</div>

</body>
</html>
